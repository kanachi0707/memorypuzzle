<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みっちーめもぱず</title>
    <link rel="icon" href="./jpg/fabicon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="./jpg/apple-touch-icon.png">
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#7c5cff">
    <meta name="apple-mobile-web-app-title" content="みっちーめもぱず">
    <meta property="og:title" content="みっちーめもぱず">
    <meta property="og:description" content="同じ絵をそろえて最速クリアを目指そう！">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kanachi0707.github.io/memorypuzzle/">
    <meta property="og:image" content="https://kanachi0707.github.io/memorypuzzle/jpg/OGP.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="みっちーめもぱず">
    <meta name="twitter:description" content="同じ絵をそろえて最速クリアを目指そう！">
    <meta name="twitter:image" content="https://kanachi0707.github.io/memorypuzzle/jpg/OGP.png">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <main class="game-shell">
        <img class="hero-image" src="jpg/Memory%20puzzle.jpg" alt="みっちーめもぱず Memory Puzzle のヘッダー画像">

        <header class="game-header">
            <p class="game-subtitle">同じ絵をそろえて最速クリアを目指そう！</p>
        </header>

        <section class="scoreboard scoreboard-top" aria-label="現在のスコア情報">
            <p>タイム: <span id="timer">00.0</span>秒</p>
            <p id="message">1枚めくるとタイマーが始まります。</p>
        </section>

        <div id="game-board" aria-label="ゲームボード"></div>

        <section class="scoreboard scoreboard-bottom" aria-label="ベストスコア情報">
            <p>ベストタイム: <span id="best-time">--</span></p>
            <p>ベストタイム日時: <span id="best-time-date">--</span></p>
            <button id="reset-button" class="reset-button" type="button">リセット</button>
        </section>

        <p class="version-note">Ver.1.01 : 2026.03.15 Updated ホーム画面追加に対応</p>

        <footer class="page-footer">
            <p>©再生の道／みっちー&こみっちー</p>
            <p>非公式／Created with AI</p>
            <p>Created by <a href="https://x.com/kanachi0707" target="_blank" rel="noreferrer">@kanachi0707</a></p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
